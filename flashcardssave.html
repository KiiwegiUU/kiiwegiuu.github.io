            { s: "Deck 6", q: "As some platform records are created on an instance after provisioning and do not match between different instances, what platform record fields should you ensure match? [LD6: Data Migration and Integration]", a: "sys_id" },
            { s: "Deck 6", q: "What path in the All menu allows you to establish connectivity to other sub–production instances you will use to retrieve Update Sets? [LD6: Data Migration and Integration]", a: "All > System Update Sets > Update Sources" },
            { s: "Deck 6", q: "When adding an Update Source you will need to specify 7 connection settings for the remote instance. What are they? [LD6: Data Migration and Integration]", a: "1. Name 2. Type 3. Active (checkbox) 4. URL 5. Username 6. Password 7. Short Description" },
            { s: "Deck 6", q: "Which module should you consider using to create and run automated tests on your ServiceNow instance after modifying it? [LD6: Data Migration and Integration]", a: "Automated Test Framework (ATF)" },
            { s: "Deck 6", q: "True/False: The system property to run automated tests is enabled by default in a baseline implementation of the platform.", a: "False The system property is disabled by default and should only be enabled on non–production instances." }
        ];

        let studyData = [];
        let wrongIndices = [];
        let currentIdx = 0;
        let currentMode = 'review';
        let isFlipped = false;
        let isShuffled = false;
        let correctCount = 0;
        let totalAnswered = 0;

        // NEW: Persistent Storage Keys
        const STORAGE_KEY = 'sn_study_progress';

        function saveProgress() {
            const state = {
                studyData,
                wrongIndices,
                currentIdx,
                currentMode,
                isShuffled,
                correctCount,
                totalAnswered
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const state = JSON.parse(saved);
                studyData = state.studyData;
                wrongIndices = state.wrongIndices;
                currentIdx = state.currentIdx;
                currentMode = state.currentMode;
                isShuffled = state.isShuffled;
                correctCount = state.correctCount;
                totalAnswered = state.totalAnswered;

                // Sync UI
                updateShuffleUI();
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('studyInterface').classList.remove('hidden');
                setMode(currentMode);
            }
        }

        function toggleShuffle() {
            isShuffled = !isShuffled;
            updateShuffleUI();
        }

        function updateShuffleUI() {
            const dot = document.getElementById('shuffleDot');
            const bg = document.getElementById('shuffleToggle');
            dot.style.transform = isShuffled ? 'translateX(1.25rem)' : 'translateX(0)';
            bg.className = isShuffled ? 'relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 bg-indigo-600' : 'relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 bg-slate-200';
        }

        function startSession() {
            const selectedSections = Array.from(document.querySelectorAll('#sectionGrid input:checked')).map(cb => cb.value);
            if (selectedSections.length === 0) {
                alert("Please select at least one section.");
                return;
            }

            studyData = rawData.filter(item => selectedSections.includes(item.s));
            initNewSession();
        }

        function initNewSession() {
            if (isShuffled) {
                studyData.sort(() => Math.random() - 0.5);
            }

            currentIdx = 0;
            wrongIndices = [];
            correctCount = 0;
            totalAnswered = 0;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('studyInterface').classList.remove('hidden');
            document.getElementById('resultsView').classList.add('hidden');
            setMode('review');
            saveProgress();
        }

        function retryIncorrect() {
            const incorrectItems = wrongIndices.map(i => studyData[i]);
            studyData = [...incorrectItems];
            initNewSession();
        }

        function exitSession() {
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('studyInterface').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('reviewBtn').className = mode === 'review' ? 'px-4 py-2 rounded-md transition-all font-bold text-sm bg-white shadow-sm text-indigo-600' : 'px-4 py-2 rounded-md transition-all font-medium text-sm text-slate-500 hover:text-slate-700';
            document.getElementById('flashcardBtn').className = mode === 'flashcards' ? 'px-4 py-2 rounded-md transition-all font-bold text-sm bg-white shadow-sm text-indigo-600' : 'px-4 py-2 rounded-md transition-all font-medium text-sm text-slate-500 hover:text-slate-700';
            document.getElementById('quizBtn').className = mode === 'quiz' ? 'px-4 py-2 rounded-md transition-all font-bold text-sm bg-white shadow-sm text-indigo-600' : 'px-4 py-2 rounded-md transition-all font-medium text-sm text-slate-500 hover:text-slate-700';
            
            document.getElementById('flashcardView').classList.toggle('hidden', mode !== 'flashcards' && mode !== 'review');
            document.getElementById('quizView').classList.toggle('hidden', mode !== 'quiz');
            document.getElementById('resultsView').classList.add('hidden');

            if (mode === 'review') {
                document.getElementById('testControls').classList.add('hidden');
                document.getElementById('reviewNextBtn').classList.remove('hidden');
            } else if (mode === 'flashcards') {
                document.getElementById('testControls').classList.remove('hidden');
                document.getElementById('reviewNextBtn').classList.add('hidden');
            }
            
            updateDisplay();
            saveProgress();
        }

        function toggleFlip() {
            if (currentMode === 'quiz') return;
            isFlipped = !isFlipped;
            document.getElementById('cardInner').classList.toggle('rotate-y-180', isFlipped);
        }

        function handleMark(isCorrect) {
            totalAnswered++;
            if (isCorrect) {
                correctCount++;
            } else {
                if (!wrongIndices.includes(currentIdx)) {
                    wrongIndices.push(currentIdx);
                }
            }
            nextItem();
        }

        function updateDisplay() {
            if (currentIdx >= studyData.length) {
                showResults();
                return;
            }

            const data = studyData[currentIdx];
            const progress = ((currentIdx) / studyData.length) * 100;
            
            document.getElementById('progressText').innerText = `Item ${currentIdx + 1} of ${studyData.length}`;
            document.getElementById('percentText').innerText = `${Math.round(progress)}%`;
            document.getElementById('progressBar').style.width = `${progress}%`;

            if (currentMode === 'flashcards' || currentMode === 'review') {
                isFlipped = false;
                document.getElementById('cardInner').classList.remove('rotate-y-180');
                document.getElementById('cardFront').innerText = data.q;
                document.getElementById('cardBack').innerText = data.a;
            } else {
                renderQuiz();
            }
        }

        function renderQuiz() {
            const data = studyData[currentIdx];
            document.getElementById('quizQuestion').innerText = data.q;
            document.getElementById('quizNextBtn').classList.add('hidden');
            document.getElementById('quizFeedback').classList.add('hidden');
            
            let options = [data.a];
            while (options.length < 4) {
                const randomItem = rawData[Math.floor(Math.random() * rawData.length)].a;
                if (!options.includes(randomItem)) options.push(randomItem);
            }
            options.sort(() => Math.random() - 0.5);

            const container = document.getElementById('quizOptions');
            container.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 rounded-2xl border border-slate-200 hover:bg-slate-50 hover:border-indigo-200 transition-all font-semibold text-slate-600";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, data.a, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct, element) {
            const buttons = document.getElementById('quizOptions').querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = true);
            const feedback = document.getElementById('quizFeedback');
            feedback.classList.remove('hidden');

            totalAnswered++;
            if (selected === correct) {
                correctCount++;
                element.className = "w-full text-left p-5 rounded-2xl border-2 border-green-500 bg-green-50 text-green-700 font-bold";
                feedback.innerText = "Correct!";
                feedback.className = "mt-10 p-6 rounded-2xl text-center font-bold bg-green-100 text-green-700";
            } else {
                wrongIndices.push(currentIdx);
                element.className = "w-full text-left p-5 rounded-2xl border-2 border-red-500 bg-red-50 text-red-700 font-bold";
                feedback.innerText = `Incorrect. Correct answer: ${correct}`;
                feedback.className = "mt-10 p-6 rounded-2xl text-center font-bold bg-red-100 text-red-700";
                buttons.forEach(btn => {
                    if (btn.innerText === correct) btn.className = "w-full text-left p-5 rounded-2xl border-2 border-green-500 bg-green-50 text-green-700 font-bold";
                });
            }
            document.getElementById('quizNextBtn').classList.remove('hidden');
            saveProgress();
        }

        function nextItem() {
            currentIdx++;
            updateDisplay();
            saveProgress();
        }

        function prevItem() {
            if (currentIdx > 0) {
                currentIdx--;
                updateDisplay();
                saveProgress();
            }
        }

        function showResults() {
            document.getElementById('flashcardView').classList.add('hidden');
            document.getElementById('quizView').classList.add('hidden');
            document.getElementById('resultsView').classList.remove('hidden');
            
            document.getElementById('progressBar').style.width = `100%`;
            document.getElementById('percentText').innerText = `100%`;

            const retryBtn = document.getElementById('retryWrongBtn');

            if (currentMode === 'review') {
                document.getElementById('resultsTitle').innerText = "Review Complete!";
                document.getElementById('resultsStats').innerText = `You reviewed all ${studyData.length} cards in this deck.`;
                retryBtn.classList.add('hidden');
            } else {
                const stats = `You got ${correctCount} correct out of ${studyData.length}.`;
                document.getElementById('resultsStats').innerText = stats;

                if (wrongIndices.length > 0) {
                    retryBtn.classList.remove('hidden');
                    retryBtn.innerText = `Review ${wrongIndices.length} Incorrect Cards`;
                } else {
                    retryBtn.classList.add('hidden');
                    document.getElementById('resultsTitle').innerText = "Perfect Score!";
                }
            }
            saveProgress();
        }

        // Keyboard Controls
        document.addEventListener('keydown', (e) => {
            const studyInterface = document.getElementById('studyInterface');
            const resultsView = document.getElementById('resultsView');
            
            if (studyInterface.classList.contains('hidden') || !resultsView.classList.contains('hidden')) return;

            if (e.code === 'Space') {
                if (currentMode === 'flashcards' || currentMode === 'review') {
                    e.preventDefault(); 
                    toggleFlip();
                }
            } else if (e.code === 'ArrowRight') {
                if (currentMode === 'review' || currentMode === 'flashcards') {
                    nextItem();
                }
            } else if (e.code === 'ArrowLeft') {
                if (currentMode === 'review' || currentMode === 'flashcards') {
                    prevItem();
                }
            }
        });

        // Initialize on load
        window.onload = loadProgress;

    </script>
</body>
</html>
