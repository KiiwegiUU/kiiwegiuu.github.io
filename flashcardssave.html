<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceNow Master Study Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .backface-hidden { backface-visibility: hidden; }
        .transform-style-3d { transform-style: preserve-3d; }
        .transition-transform-600 { transition: transform 0.6s; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a5b4fc; }

        .btn-correct { background-color: #22c55e; }
        .btn-wrong { background-color: #ef4444; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">

    <div id="startScreen" class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-8 md:p-12 border border-slate-100">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-black text-slate-800 mb-2">ServiceNow Study Hub</h1>
                <p class="text-slate-500">Select the sections you wish to study</p>
            </div>

            <div id="sectionGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <label class="flex items-center p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-indigo-50 border border-transparent hover:border-indigo-200 transition-all group">
                    <input type="checkbox" value="Decks 1 & 2" checked class="w-5 h-5 rounded border-slate-300 text-indigo-600">
                    <span class="ml-4 font-semibold text-slate-700 group-hover:text-indigo-700">Decks 1 & 2 - Platform Overview, Navigation, Instance Config (63)</span>
                </label>
                <label class="flex items-center p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-indigo-50 border border-transparent hover:border-indigo-200 transition-all group">
                    <input type="checkbox" value="Deck 3" checked class="w-5 h-5 rounded border-slate-300 text-indigo-600">
                    <span class="ml-4 font-semibold text-slate-700 group-hover:text-indigo-700">Deck 3 - Config Apps for collaboration (78)</span>
                </label>
                <label class="flex items-center p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-indigo-50 border border-transparent hover:border-indigo-200 transition-all group">
                    <input type="checkbox" value="Old Reporting" checked class="w-5 h-5 rounded border-slate-300 text-indigo-600">
                    <span class="ml-4 font-semibold text-slate-700 group-hover:text-indigo-700">Old Reporting and Report Types(23)</span>
                </label>
                <label class="flex items-center p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-indigo-50 border border-transparent hover:border-indigo-200 transition-all group">
                    <input type="checkbox" value="Deck 4" checked class="w-5 h-5 rounded border-slate-300 text-indigo-600">
                    <span class="ml-4 font-semibold text-slate-700 group-hover:text-indigo-700">Deck 4 - Self Service and Automation (30)</span>
                </label>
                <label class="flex items-center p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-indigo-50 border border-transparent hover:border-indigo-200 transition-all group">
                    <input type="checkbox" value="Deck 5" checked class="w-5 h-5 rounded border-slate-300 text-indigo-600">
                    <span class="ml-4 font-semibold text-slate-700 group-hover:text-indigo-700">Deck 5 - DB Managmement(54)</span>
                </label>
                <label class="flex items-center p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-indigo-50 border border-transparent hover:border-indigo-200 transition-all group">
                    <input type="checkbox" value="Deck 6" checked class="w-5 h-5 rounded border-slate-300 text-indigo-600">
                    <span class="ml-4 font-semibold text-slate-700 group-hover:text-indigo-700">Deck 6 - Data Migration and Integration (30)</span>
                </label>
            </div>

            <div class="flex items-center justify-between p-4 bg-indigo-50 rounded-2xl mb-10 border border-indigo-100">
                <span class="font-bold text-indigo-900">Randomize Card Order</span>
                <button id="shuffleToggle" onclick="toggleShuffle()" class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 bg-slate-200">
                    <span id="shuffleDot" class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow transition duration-200 translate-x-0"></span>
                </button>
            </div>

            <button onclick="startSession()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-xl hover:bg-indigo-700 shadow-xl transition-all transform hover:-translate-y-1">
                Start Studying
            </button>
        </div>
    </div>

    <div id="studyInterface" class="hidden">
        <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50 shadow-sm">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <button onclick="exitSession()" class="text-slate-500 hover:text-indigo-600 font-bold flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Menu
                </button>
                <div class="flex bg-slate-100 p-1 rounded-lg">
                    <button id="reviewBtn" onclick="setMode('review')" class="px-4 py-2 rounded-md transition-all font-medium text-sm">Review</button>
                    <button id="flashcardBtn" onclick="setMode('flashcards')" class="px-4 py-2 rounded-md transition-all font-medium text-sm">Test</button>
                    <button id="quizBtn" onclick="setMode('quiz')" class="px-4 py-2 rounded-md transition-all font-medium text-sm">Quiz</button>
                </div>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-6">
            <div class="mb-8">
                <div class="flex justify-between text-xs font-semibold text-slate-500 mb-2">
                    <span id="progressText">Question 1 of 138</span>
                    <span id="percentText">0%</span>
                </div>
                <div class="w-full bg-slate-200 rounded-full h-2">
                    <div id="progressBar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <div id="flashcardView">
                <div class="perspective-1000 w-full h-80 md:h-[400px] cursor-pointer group" onclick="toggleFlip()">
                    <div id="cardInner" class="relative w-full h-full transform-style-3d transition-transform-600 shadow-2xl rounded-3xl">
                        <div class="absolute inset-0 backface-hidden bg-white rounded-3xl flex items-center justify-center p-10 text-center border border-slate-200 overflow-y-auto">
                            <p id="cardFront" class="text-xl md:text-2xl font-bold text-slate-700 leading-relaxed whitespace-pre-wrap"></p>
                            <div class="absolute bottom-6 text-xs text-slate-400 font-bold uppercase tracking-widest">Tap to Flip</div>
                        </div>
                        <div class="absolute inset-0 backface-hidden bg-slate-50 rounded-3xl flex items-center justify-center p-10 text-center rotate-y-180 border-2 border-indigo-200 overflow-y-auto">
                            <p id="cardBack" class="text-xl md:text-2xl font-bold text-indigo-900 leading-relaxed whitespace-pre-wrap"></p>
                            <div class="absolute bottom-6 text-xs text-indigo-400 font-bold uppercase tracking-widest">Answer</div>
                        </div>
                    </div>
                </div>
                
                <div id="testControls" class="grid grid-cols-2 gap-4 mt-8">
                    <button onclick="handleMark(false)" class="flex flex-col items-center justify-center p-4 bg-red-50 text-red-600 border border-red-100 rounded-2xl hover:bg-red-100 transition-colors">
                        <span class="font-black text-lg">Study Again</span>
                        <span class="text-xs opacity-70">Mark as Incorrect</span>
                    </button>
                    <button onclick="handleMark(true)" class="flex flex-col items-center justify-center p-4 bg-green-50 text-green-600 border border-green-100 rounded-2xl hover:bg-green-100 transition-colors">
                        <span class="font-black text-lg">Got it</span>
                        <span class="text-xs opacity-70">Mark as Correct</span>
                    </button>
                </div>
                
                <div class="flex justify-center gap-4 mt-6">
                    <button onclick="prevItem()" class="px-8 py-2 text-slate-400 hover:text-slate-600 transition-colors font-bold uppercase text-xs tracking-widest">Previous</button>
                    <button id="reviewNextBtn" onclick="nextItem()" class="px-8 py-2 text-slate-400 hover:text-slate-600 transition-colors font-bold uppercase text-xs tracking-widest hidden">Next</button>
                </div>
            </div>

            <div id="quizView" class="hidden">
                <div class="bg-white rounded-3xl shadow-xl p-8 md:p-12 border border-slate-100">
                    <h2 id="quizQuestion" class="text-xl md:text-2xl font-black text-slate-800 mb-10 leading-tight whitespace-pre-wrap"></h2>
                    <div id="quizOptions" class="space-y-4"></div>
                    <div id="quizFeedback" class="mt-10 hidden p-6 rounded-2xl text-center font-bold text-lg"></div>
                    <div class="mt-10 flex justify-end">
                        <button id="quizNextBtn" onclick="nextItem()" class="px-10 py-3 bg-indigo-600 text-white rounded-2xl hover:bg-indigo-700 font-bold hidden shadow-lg">Continue</button>
                    </div>
                </div>
            </div>

            <div id="resultsView" class="hidden text-center py-16 bg-white rounded-3xl shadow-xl border border-slate-100">
                <div class="inline-block p-6 bg-indigo-100 rounded-full mb-8 text-indigo-600">
                    <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <h2 class="text-4xl font-black text-slate-800 mb-2" id="resultsTitle">Session Summary</h2>
                <p class="text-xl text-slate-500 mb-8" id="resultsStats"></p>
                
                <div class="flex flex-col gap-4 max-w-xs mx-auto">
                    <button id="retryWrongBtn" onclick="retryIncorrect()" class="hidden px-8 py-4 bg-red-500 text-white rounded-2xl hover:bg-red-600 font-black text-xl transition-all shadow-xl shadow-red-100">
                        Review Incorrect
                    </button>
                    <button onclick="exitSession()" class="px-8 py-4 bg-indigo-600 text-white rounded-2xl hover:bg-indigo-700 font-black text-xl transition-all shadow-xl">
                        Back to Menu
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const rawData = [
            // [Decks 1 & 2 - 63 items]
            { s: "Decks 1 & 2", q: "What is the system property required to be added and set to true to see impersonation events in the System Log?\n\n[LD1: Platform Overview and Navigation]", a: "glide.sys.log_impersonation" },
            { s: "Decks 1 & 2", q: "Groups are represented by a record on the ______ table.\n\n[LD2: Instance Configuration]", a: "Group [sys_user_group]" },
            { s: "Decks 1 & 2", q: "Modernized Work Experience – what are the 4 modules that comprise Employee Experience?\n\n[LD1: Platform Overview and Navigation]", a: "– HR Service Delivery, – Workplace Service Delivery, – Safe Workplace Suite, – Employee Center Portal" },
            { s: "Decks 1 & 2", q: "What are the 5 main elements on the top right of the Unified Navigation Header to the right of the global search? (assume logged in as system administrator)\n\n[LD1: Platform Overview and Navigation]", a: "Application Scope picker (Globe), sidebar, usage analytics, help, notifications, user" },
            { s: "Decks 1 & 2", q: "True/False: Applying a role to a user will apply that role's permissions as well as the permissions of any role's contained within.\n\n[LD2: Instance Configuration]", a: "True" },
            { s: "Decks 1 & 2", q: "What is the name of the 'bubble' in the center of the navigation header whose purpose is to remind you where you are inside the platform?\n\n[LD1: Platform Overview and Navigation]", a: "Contextual app pill" },
            { s: "Decks 1 & 2", q: "What roles are required to impersonate other users?\n\n[LD1: Platform Overview and Navigation]", a: "'admin' and 'impersonator'" },
            { s: "Decks 1 & 2", q: "Modernized Work Experience – what are the 3 modules that comprise Operating Excellence?\n\n[LD1: Platform Overview and Navigation]", a: "– Global Business Services, – Strategic Portfolio Management, – Legal Service Delivery" },
            { s: "Decks 1 & 2", q: "Why would you grant an approver_user role?\n\n[LD2: Instance Configuration]", a: "Granted to a user who has the ability to view/modify approval records, but no other roles (does not include itil)." },
            { s: "Decks 1 & 2", q: "Name 6 common types of fields found in Forms.\n\n[LD1: Platform Overview and Navigation]", a: "– Choice, – Date/Time, – List, – Reference, – String, – True/False" },
            { s: "Decks 1 & 2", q: "Who is the current CEO of ServiceNow?\n\n[LD1: Platform Overview and Navigation]", a: "Bill McDermott" },
            { s: "Decks 1 & 2", q: "What path in the All Menu brings up the Plugins module?\n\n[LD2: Instance Configuration]", a: "All > System Definition > Plugins" },
            { s: "Decks 1 & 2", q: "ServiceNow Platform is in aPaaS. What does this stand for and what does it mean?\n\n[LD1: Platform Overview and Navigation]", a: "Application Platform–as–a–Service. Means the application is hosted in the Cloud and companies don’t need to manage equipment necessary to host these applications." },
            { s: "Decks 1 & 2", q: "Modernized Work Experience – what are the 4 modules that comprise Build and Automate?\n\n[LD1: Platform Overview and Navigation]", a: "– App Engine Studio, ServiceNow Studio, Workflow Studio, Creator Studio" },
            { s: "Decks 1 & 2", q: "What path in the All Menu allows you to customize system properties?\n\n[LD2: Instance Configuration]", a: "All > System Properties > System" },
            { s: "Decks 1 & 2", q: "What path in the All Menu allows you to manage the Companies list?\n\n[LD2: Instance Configuration]", a: "All > User Administration > Companies or All > Organization > Companies" },
            { s: "Decks 1 & 2", q: "Under the User Preferences menu, what are the 6 global preference types can you customize?\n\n[LD1: Platform Overview and Navigation]", a: "– Display, Theme, Accessibility, Debugging, Language and Region, User Experience" },
            { s: "Decks 1 & 2", q: "What is the Service Operations Workspace used for?\n\n[LD1: Platform Overview and Navigation]", a: "– Unified experience for multiple ITSM workflows, – Task records for Incidents, Requests, Walk–ups, Calls, etc." },
            { s: "Decks 1 & 2", q: "Why would you grant a specialized administrator role?\n\n[LD2: Instance Configuration]", a: "Granted to a user who is accountable for managing specific functions or applications (ex. HR, Knowledge Base, assignment rules, reports, web services)" },
            { s: "Decks 1 & 2", q: "Describe the difference between configuration and customization.\n\n[LD2: Instance Configuration]", a: "configuration: most of what an admin can do without code; customization: performed when a customer requires additional functionality / features not pre–existing in the platform" },
            { s: "Decks 1 & 2", q: "Define the difference between these 3 actions: Save (via right–click header), Update or Submit.\n\n[LD1: Platform Overview and Navigation]", a: "Save: saves the record and remains there; Update: saves the record and returns to previous page; Submit: saves a new record and returns to previous page" },
            { s: "Decks 1 & 2", q: "Roles are represented by a record that exists on the ____________ table. Define a role.\n\n[LD2: Instance Configuration]", a: "Role [sys_user_role]; role: collection of permissions defining user access to applications and what actions they can take." },
            { s: "Decks 1 & 2", q: "What path in the All Menu allows you to launch the Employee Center?\n\n[LD1: Platform Overview and Navigation]", a: "All > Self–Service > Employee Center" },
            { s: "Decks 1 & 2", q: "Can employees make requests directly from the Employee Center?\n\n[LD1: Platform Overview and Navigation]", a: "Yes. Employees can make requests by selecting the relevant knowledge base article pertaining to their problem." },
            { s: "Decks 1 & 2", q: "What 2 checks should you perform before installing a new Plugin?\n\n[LD2: Instance Configuration]", a: "1. The role required to activate the plugin, 2. The related plugins that will be installed or activated" },
            { s: "Decks 1 & 2", q: "Why would the user menu look like this? (encircled red with a red up arrow)\n\n[LD1: Platform Overview and Navigation]", a: "This icon indicates that the administrator is currently elevated to a higher privilege." },
            { s: "Decks 1 & 2", q: "What are the 5 main tabs on the top left of the Unified Navigation Header?\n\n[LD1: Platform Overview and Navigation]", a: "All, Favorites, History, Workspaces, Admin" },
            { s: "Decks 1 & 2", q: "Who is the founder of ServiceNow?\n\n[LD1: Platform Overview and Navigation]", a: "Fred Luddy" },
            { s: "Decks 1 & 2", q: "What path in the All Menu allows you to see your group’s work?\n\n[LD1: Platform Overview and Navigation]", a: "All > Service Desk > My Groups Work" },
            { s: "Decks 1 & 2", q: "The System Administrator role has almost all roles with 2 exceptions. What are they?\n\n[LD2: Instance Configuration]", a: "1. HR, 2. Security Operations" },
            { s: "Decks 1 & 2", q: "ServiceNow utilizes an advanced, multi–instance, single–tenant architecture by default. What does single–tenant mean?\n\n[LD2: Instance Configuration]", a: "single–tenant: each instance features an isolated database containing data, applications and customizations" },
            { s: "Decks 1 & 2", q: "There are 5 highlighted benefits to using ServiceNow.\n\n[LD1: Platform Overview and Navigation]", a: "– Configurable web–based interface, – Single system of record, – Single data model allows sharing between apps/departments, – Integration with other enterprise systems / plug–play, – Custom Applications" },
            { s: "Decks 1 & 2", q: "What are the 5 Role (Persona) types available in the platform?\n\n[LD2: Instance Configuration]", a: "System Administrator, Specialized Administrator, Process User, Approver, Requester" },
            { s: "Decks 1 & 2", q: "What path in the All Menu allows you to bring up the Application Manager?\n\n[LD2: Instance Configuration]", a: "All > System Applications > All Available Applications > All" },
            { s: "Decks 1 & 2", q: "What path in the All Menu brings up Users, Groups or Roles administration modules?\n\n[LD2: Instance Configuration]", a: "– All > User Administration > Users/Groups/Roles OR – All > System Security > Users and Groups > Users/Groups/Roles" },
            { s: "Decks 1 & 2", q: "Which 3 areas can you not access when you impersonate a user with an application–specific admin role?\n\n[LD1: Platform Overview and Navigation]", a: "– Security incidents, – Profile information including password changes, – Filter navigator access is restricted" },
            { s: "Decks 1 & 2", q: "Describe the difference between Work Notes and Additional Comments in a Form view.\n\n[LD1: Platform Overview and Navigation]", a: "Work Notes: document internal notes, not visible externally; Additional Comments: visible to customers" },
            { s: "Decks 1 & 2", q: "What is the Employee Center?\n\n[LD1: Platform Overview and Navigation]", a: "Unified portal provides a centralized experience for internal employees" },
            { s: "Decks 1 & 2", q: "Applications are installed in application scopes. Define what this is.\n\n[LD2: Instance Configuration]", a: "application scope: protects applications by restricting access to the application’s files/data from other applications/services." },
            { s: "Decks 1 & 2", q: "Name 3 of the many common ways to interact with the ServiceNow platform.\n\n[LD1: Platform Overview and Navigation]", a: "– Workspace, – List, – Form, – Dashboard, – Knowledge Base, – Service Catalog" },
            { s: "Decks 1 & 2", q: "What path in the All Menu allows you to customize your company image and colors?\n\n[LD2: Instance Configuration]", a: "All > System Properties > My Company" },
            { s: "Decks 1 & 2", q: "Modernized Work Experience – what are the 4 modules that comprise Technology Excellence?\n\n[LD1: Platform Overview and Navigation]", a: "– ITSM, – ITOM, – Security Operations, – IT Asset Management" },
            { s: "Decks 1 & 2", q: "Why would you grant a process user role?\n\n[LD2: Instance Configuration]", a: "Granted to a user who has clearly defined paths and workflows in the platform and have one or more roles, including itil and approver_user (ex. Incident, Change Management)" },
            { s: "Decks 1 & 2", q: "What is an instance and what are the 3 typical environments for this?\n\n[LD2: Instance Configuration]", a: "instance: copy of ServiceNow environment specific to customer; 1. Production, 2. Non–Prod, 3. Development" },
            { s: "Decks 1 & 2", q: "Users are represented by a record on the ______ table.\n\n[LD2: Instance Configuration]", a: "User [sys_user]" },
            { s: "Decks 1 & 2", q: "Why would you grant a requester user role?\n\n[LD2: Instance Configuration]", a: "Granted to users who do not have roles but can submit and manage their own requests (ex. Employee Self Service)" },
            { s: "Decks 1 & 2", q: "What are the 4 base workflows available within the ServiceNow platform to choose from?\n\n[LD1: Platform Overview and Navigation]", a: "1. IT Workflows, 2. Employee Workflows, 3. Customer Workflows, 4. Creator Workflows" },
            { s: "Decks 1 & 2", q: "Modernized Work Experience – what are the 2 modules that comprise Customer Experience?\n\n[LD1: Platform Overview and Navigation]", a: "– CSM (Customer Service Management), – FSM (Field Service Management)" },
            { s: "Decks 1 & 2", q: "Admins can choose to Elevate role. What role does this elevate to and why would you use this feature?\n\n[LD1: Platform Overview and Navigation]", a: "'security_admin'; allows users to modify ACL (access control lists)" },
            { s: "Decks 1 & 2", q: "What path in the All Menu allows you to create a new Incident?\n\n[LD1: Platform Overview and Navigation]", a: "All > Incident > Create New" },
            { s: "Decks 1 & 2", q: "Which 3 roles are recommended to create logins for testing purposes?\n\n[LD1: Platform Overview and Navigation]", a: "admin, itil, ess" },
            { s: "Decks 1 & 2", q: "What are the 4 interfaces you can interact with and experience within the ServiceNow platform?\n\n[LD1: Platform Overview and Navigation]", a: "1. The Next Experience (Unified Navigation), 2. Now Mobile App, 3. Service Portal, 4. Employee Center" },
            { s: "Decks 1 & 2", q: "Complete this sentence: “Everything in ServiceNow is ______”.\n\n[LD1: Platform Overview and Navigation]", a: "a record in a table." },
            { s: "Decks 1 & 2", q: "What is this element of the interface called?\n\n[LD1: Platform Overview and Navigation]", a: "Unified Navigation Header" },
            { s: "Decks 1 & 2", q: "Why would the user menu look like this? (white eye icon)\n\n[LD1: Platform Overview and Navigation]", a: "This icon indicates that the administrator is currently impersonating another user." },
            { s: "Decks 1 & 2", q: "Which 2 fields are mandatory for Incident creation?\n\n[LD1: Platform Overview and Navigation]", a: "– Caller, – Short Description" },
            { s: "Decks 1 & 2", q: "If you cannot find a certain plugin, what other options are available?\n\n[LD2: Instance Configuration]", a: "Check the ServiceNow Store. Failing that, submit a request to ServiceNow." },
            { s: "Decks 1 & 2", q: "What is a baseline implementation?\n\n[LD2: Instance Configuration]", a: "baseline implementation: a set of installed applications on an instance prior to config or customization." },
            { s: "Decks 1 & 2", q: "There are 5 key areas that comprise the Modernized Work Experience. What are they?\n\n[LD1: Platform Overview and Navigation]", a: "– Customer Experience, – Technology Excellence, – Employee Experience, – Operating Excellence, – Build and Automate" },
            { s: "Decks 1 & 2", q: "Name 3 of the many benefits of the Employee Center.\n\n[LD1: Platform Overview and Navigation]", a: "– Access to information and services across all departments\n– Can be accessed through any type of device\n– Best–in–class home page and widgets\n– Content discovery\n– AI search\n– News and Events" },
            { s: "Decks 1 & 2", q: "What do these icons represent on the right panel support tools of a Service Operations Workspace for an Incident record?", a: "Record Information, Recommendation, Agent Assist, Expert-on-call, collaborate, attachments, template, email template" },
            { s: "Decks 1 & 2", q: "What is the system property required to be activated and set to true to implement the dark theme?\n\n[LD2: Instance Configuration]", a: "glide.ui.polaris.dark_themes_enabled" },
            { s: "Decks 1 & 2", q: "Best practice: rather than adding roles to individual users, what should you do?\n\n[LD2: Instance Configuration]", a: "Create a group matching the required role and assign the role to the group. Then add the user to the group." },
            { s: "Deck 3", q: "A list displays a set of records from a table. What does a row and column represent?", a: "Row: One record; Column: One field." },
            { s: "Deck 3", q: "Identify these features of the List interface (Next Experience).", a: "1. List Selector/Title, 2. Breadcrumbs, 3. Column Search, 4. Column Headers, 5. Field Values." },
            { s: "Deck 3", q: "How do you create a Tag from a List view?", a: "Right-click a field value and select Assign Tag." },
            { s: "Deck 3", q: "Provide the 3 List Context (or Control) menus.", a: "1. List Controls, 2. Column Options, 3. Record Context Menu." },
            { s: "Deck 3", q: "What are the 3 components that make up a filter condition?", a: "1. Field, 2. Operator, 3. Value." },
            { s: "Deck 3", q: "What are 4 quick-edit functions available via right-click in a List?", a: "1. Assign to me, 2. Assign tag, 3. Approve, 4. Reject. (also show matching, filter out, copy url, copy sys_id, add to vtb, follow/show live feed, archive record)" },
            { s: "Deck 3", q: "What does a list view define?", a: "A version of the list specifying which fields appear and their order." },
            { s: "Deck 3", q: "What are the default sort controls for a list if none exist?", a: "Order field, number field, name field, or the designated display field." },
            { s: "Deck 3", q: "What role is required to change column order for all users?", a: "personalize_list." },
            { s: "Deck 3", q: "How do you bring up configuration for a List Layout?", a: "Column Options > Configure > List Layout." },
            { s: "Deck 3", q: "What path in the All Menu allows you to edit Modules?", a: "All > System Definition > Application Menus." },
            { s: "Deck 3", q: "In a List, what is the gear icon called? What does it allow?", a: "Personalize List. Allows users to locally Add/Remove/Rearrange columns." },
            { s: "Deck 3", q: "When creating a new Module what are the 2 tabs needed?", a: "Visibility (set roles) and Link Type (set table/filter)." },
            { s: "Deck 3", q: "What are the 3 context menus in a Workspace List?", a: "Grab Icon (Move), More Options (Filter), More UI Actions (Show Matching)." },
            { s: "Deck 3", q: "How do you configure a list layout from within Classic view?", a: "Column options menu > Configure > List Layout." },
            { s: "Deck 3", q: "What are the options for viewing Lists in Workspace?", a: "List view, Record view (Preview), and Open in New Tab." },
            { s: "Deck 3", q: "How do you edit data directly within a Workspace?", a: "Use Record Preview (side panel) or double-click for Inline Editing." },
            { s: "Deck 3", q: "What system property enables double-click inline editing in Workspace?", a: "glide.lists.inline_editing_enabled." },
            { s: "Deck 3", q: "An Application/Module list in Classic is equivalent to what in Workspace?", a: "A UX List within a List Category." },
            { s: "Deck 3", q: "What tool allows you to build new Categories/UX Lists for Workspaces?", a: "UI Builder." },
            { s: "Deck 3", q: "What are the 3 steps to building a new UX List in UI Builder?", a: "1. Create Category, 2. Create UX List, 3. Map to Audience." },
            { s: "Deck 3", q: "What needs to happen to make a UX List visible?", a: "Define the Audience and link it to the List Applicability." },
            { s: "Deck 3", q: "What should you check before accessing UI Builder?", a: "Ensure your Application Scope is correct." },
            { s: "Deck 3", q: "What does a form do?", a: "Displays information from a single record." },
            { s: "Deck 3", q: "Identify these features of the Form interface in Classic view.", a: "1. Back, 2. Context Menu, 3. Title, 4. Attachments, 5. Activity Stream, 6. Personalize, 7. More Options, 8. Submit/Update, 9. Resolve, 10. Prev/Next." },
            { s: "Deck 3", q: "Before configuring a form, what should you select first?", a: "The appropriate View." },
            { s: "Deck 3", q: "What are the 3 main methods available to configure a form?", a: "1. Form Builder (Recommended), 2. Form Design (Visual), 3. Form Layout (Slushbucket)." },
            { s: "Deck 3", q: "Which form config methods allow for 'dot-walking' to fields on related tables?", a: "Form Layout and Form Builder." },
            { s: "Deck 3", q: "How do you edit Related Lists on a Form?", a: "Configure > Related Lists." },
            { s: "Deck 3", q: "How do you personalize a form in Workspace?", a: "Details tab > Additional Actions dots > Personalize form." },
            { s: "Deck 3", q: "How do you disable user Form Personalization?", a: "Set system property glide.ui.personalize_form.role to admin." },
            { s: "Deck 3", q: "What must you verify before editing a Form for a Workspace?", a: "Correct Application Scope and View (Workspace). Pink background (Design) or header banner (Builder) warn of wrong scope." },
            { s: "Deck 3", q: "What are the 4 main panels of the modern Form Builder?", a: "1. Header, 2. Left Pane (Components), 3. Center Canvas, 4. Right Pane (Properties)." },
            { s: "Deck 3", q: "How do you add a dot-walked field using modern Form Builder?", a: "Drag Reference field onto canvas; expand in the appearing dialog to select related fields." },
            { s: "Deck 3", q: "What is a formatter?", a: "Element used to display non-field info (e.g. Activity Stream)." },
            { s: "Deck 3", q: "How do you add an item to a Choice List?", a: "Right-click Label > Configure Choices, or use Form Builder right pane." },
            { s: "Deck 3", q: "Difference between Show Choice List and Configure Choices?", a: "Show Choice List: all tables of same type; Configure Choices: specific table." },
            { s: "Deck 3", q: "What are the different Impact and Urgency levels?", a: "1 - High, 2 - Medium, 3 - Low" },
            { s: "Deck 3", q: "What are the different Priority levels?", a: "1 - Critical, 2 - High, 3 - Moderate, 4 - Low, 5 - Planning" },
            { s: "Deck 3", q: "What are the different State choices?", a: "New, In Progress, On Hold, Resolved, Closed, Canceled" },
            { s: "Deck 3", q: "How do you add an item to a reference list on a Form?", a: "Lookup icon (Magnifier) > Click 'New'." },
            { s: "Deck 3", q: "Define a VTB and its 2 types.", a: "Visual Task Board. 1. Freeform, 2. Data-driven." },
            { s: "Deck 3", q: "What are the 4 sections within a VTB?", a: "Taskboard Tools, Quick Panel (assignees), Lanes (categories), Cards (records)." },
            { s: "Deck 3", q: "Modern path to create dashboards/visualizations?", a: "All > Platform Analytics > Analytics Center." },
            { s: "Deck 3", q: "Modern path to view Dashboards?", a: "All > Platform Analytics > Library > Dashboards." },
            { s: "Deck 3", q: "Modern path to view visualizations?", a: "All > Platform Analytics > Library > Data Visualizations." },
            { s: "Deck 3", q: "What are the share levels in Platform Analytics?", a: "Users, Groups, and Roles." },
            { s: "Deck 3", q: "How can shared users interact with platform analytics?", a: "Can view, can edit, can share." },
            { s: "Deck 3", q: "What are the 4 sections in modern Data Visualization designer?", a: "Visualization type, Header and border, Data, Presentation." },
            { s: "Deck 3", q: "Actions in 'more actions' for visuals/dashboards?", a: "Create new, duplicate, share, export, schedule, bookmark, delete." },
            { s: "Deck 3", q: "How do you duplicate a Visualization/Dashboard in Platform Analytics?", a: "Three-dot menu (...) > Duplicate." },
            { s: "Deck 3", q: "How do you generate a direct URL for a Visual/Dashboard?", a: "More Actions (...) > Share > Copy Link." },
            { s: "Deck 3", q: "What are the 3 'Viewable By' options for a Tag?", a: "Me, Groups and Users, Everyone." },
            { s: "Deck 3", q: "What can show performance trends over time?", a: "Visualizations, visualizations on dashboards." },
            { s: "Deck 3", q: "Why use a Form Template and how is it accessed?", a: "Auto-populating fields. Access via More Options (...) > Toggle Template Bar." },
            { s: "Deck 3", q: "Role required to share templates with groups?", a: "template_editor_group." },
            { s: "Deck 3", q: "Why restrict template creation?", a: "Security risk; can bypass Mandatory fields or UI Policies." },
            { s: "Deck 3", q: "Path to create Email Client Templates?", a: "All > Email Client > Email Client Templates." },
            { s: "Deck 3", q: "Role required for Quick Messages?", a: "email_client_quick_message_author." },
            { s: "Deck 3", q: "Path for Quick Messages?", a: "All > Email Client > Quick Messages." },
            { s: "Deck 3", q: "Syntax to reference field values in Quick Messages?", a: "${table_name.field_name}" },
            { s: "Deck 3", q: "Path to view/create Notifications?", a: "All > System Notification > Email > Notifications." },
            { s: "Deck 3", q: "Path to view Email Layouts and purpose?", a: "All > System Policy > Email > Layouts. Specify HTML content for body." },
            { s: "Deck 3", q: "Path to view Email Templates and purpose?", a: "All > System Notification > Email > Templates. Create subject and body." },
            { s: "Deck 3", q: "What are the 3 tabs of a Notification?", a: "1. When to send, 2. Who will receive, 3. What it will contain." },
            { s: "Deck 3", q: "Benefit of watermark label?", a: "Allows platform to match incoming email to records." },
            { s: "Deck 3", q: "Default length of Watermark label?", a: "31 characters." },
            { s: "Deck 3", q: "What is the Sidebar module used for?", a: "Real–time collaboration and discussion pertaining to a record." },
            { s: "Deck 3", q: "What is Integration Hub used for? Actions name?", a: "3rd-party integrations; actions are Spokes." },
            { s: "Deck 3", q: "What does Automation Center do?", a: "Central hub to manage all automation (RPA, Flow, etc.)." },
            { s: "Deck 3", q: "What does Predictive Intelligence do?", a: "Uses Machine Learning to categorize or route records." },
            { s: "Deck 3", q: "What role initiates Predictive Intelligence setup?", a: "ml_admin." },
            { s: "Deck 3", q: "Path to Instance Scan?", a: "All > Instance Scan." },
            { s: "Deck 3", q: "4 types of Checks in Instance Scan?", a: "Table, Column, Script Only, Linter." },
            { s: "Deck 3", q: "Where to look for Release Notes?", a: "docs.servicenow.com." },
            { s: "Deck 3", q: "Module to plan upgrades?", a: "Upgrade Center." },
            { s: "Deck 3", q: "Define Family, Upgrading, and Updating.", a: "Family: release name. Upgrading: new family. Updating: new patch." },
            { s: "Deck 3", q: "What are the 7 high–level phases of an Upgrade?", a: "1. Read notes, 2. Prepare dev, 3. Verify config, 4. Upgrade/validate dev, 5. Upgrade/validate non-prod, 6. Prepare prod, 7. Upgrade prod." },

            // [Old Reporting]
            { s: "Old Reporting", q: "Describe the old workflow for creating reports.", a: "Identify data source, select report type, configure data to display, style the chart" },
            { s: "Old Reporting", q: "What is the path to access Report Sources?", a: "all >platform analytics administration > data sources >report sources" },
            { s: "Old Reporting", q: "What is the path to create a new report using the classic menu?", a: "all>platform analytics administration > usage and governance >reports .. then create new" },
            { s: "Old Reporting", q: "Name the 3 source types for visualizations.", a: "3 source types for visualizations - table (non-system, most common), data, external import (external import seems deprecated... must create table first)" },
            { s: "Old Reporting", q: "Define a data source in the context of reporting and list its sub-types.", a: "a data source defines one or more filter conditions that are predefined that a report creator can simply reuse instead of redefining in each report. - these are broken down into indicator sources, breakdown sources, report sources, import tables." },
            { s: "Old Reporting", q: "Which roles are required to use or create a Report Source?", a: "Any user with the report_user role can use a Report Source. Users with the report_admin role can also create Report Sources." },
            { s: "Old Reporting", q: "What is a known limitation regarding creating reports with Analytics Q&A?", a: "Could be mine only but creating a report with Analytics Q&A seems to not work anymore" },
            { s: "Old Reporting", q: "Define a Bar Chart.", a: "A Bar chart lets you perform comparisons by grouping records into categories using an attribute" },
            { s: "Old Reporting", q: "What is the benefit of using both Stack by and Group by in a report?", a: "Using both Stack by and Group by lets you categorize your data by two attributes simultaneously." },
            { s: "Old Reporting", q: "What does adding one or more 'Additional group by' fields enable?", a: "Adding one or more Additional group by fields enables you to dynamically \"slice and dice\" your data." },
            { s: "Old Reporting", q: "What does the Aggregation setting allow you to do?", a: "The Aggregation setting lets you calculate aggregate information about your data, such as maximum duration, minimum reassignment count, or average cost." },
            { s: "Old Reporting", q: "What happens when you select the 'Display data table' check box?", a: "Selecting the check next to Display data table makes a table representing the same information in text table form." },
            { s: "Old Reporting", q: "Define a Pie Chart.", a: "A Pie chart allows you to perform comparisons of individual pieces of data to the whole." },
            { s: "Old Reporting", q: "Define Single score reports.", a: "Single score reports display a single value or metric that is key to your business." },
            { s: "Old Reporting", q: "What is the purpose of building a Time Series report?", a: "Build a Time Series report to present the historical performance of an attribute and detect changes in its trend and pattern of movement over time." },
            { s: "Old Reporting", q: "How do you manually configure the historical data trend in a Time Series report?", a: "To manually configure the historical data trend in a Time Series report, set the Trend by, Per, and Aggregation properties." },
            { s: "Old Reporting", q: "Which Time Series report visualization types are available in the Report Designer?", a: "e following Time Series report visualization types are available in the Type section of the Report Designer: column, spline, area, line, step line" },
            { s: "Old Reporting", q: "Define Multidimensional reports.", a: "Multidimensional reports visualize data from multiple attributes in a single table or graph." },
            { s: "Old Reporting", q: "Define Bubble charts.", a: "Bubble charts display a graph with two to four dimensions, resembling both a scatter plot and a proportional area chart." },
            { s: "Old Reporting", q: "Define a Heatmap report.", a: "A Heatmap report displays data values on a matrix using different colors." },
            { s: "Old Reporting", q: "Define Multilevel pivot tables.", a: "Multilevel pivot tables display a collection of data broken down by multiple dimensions in a single table." },
            { s: "Old Reporting", q: "What is the outcome of publishing a report?", a: "Publishing your report generates a shareable link for anyone to access your report." },
            { s: "Old Reporting", q: "Is the Publish functionality enabled by default, and how do you enable it?", a: "Note that the Publish functionality is not enabled by default. Set the glide.report.published_reports.enabled property to true to enable." },

            //[Deck 4]
            { s: "Deck 4", q: "There are 5 portals available in the baseline implementation. What are they? [LD4: Self–Service & Automation]", a: "1. Employee Center (/esc) 2. Service Portal (/sp) 3. Knowledge Portal (/kb) 4. Change Advisory Board (CAB) Workbench (/cab) 5. Instance Security Center (/isc)" },
            { s: "Deck 4", q: "Which role, in addition to \"admin\", allows a user to manage Knowledge Bases? [LD4: Self–Service & Automation]", a: "knowledge_admin" },
            { s: "Deck 4", q: "What path in the All Menu allows you to view Knowledge Bases? [LD4: Self–Service & Automation]", a: "All > Self–Service > Knowledge or All > Service Desk > Knowledge" },
            { s: "Deck 4", q: "Which 3 methods are available to sort documentation within a Knowledge Base?", a: "1. Relevancy (most useful) 2. Most recently updated 3. Number of views" },
            { s: "Deck 4", q: "What path in the All Menu allows you to view Knowledge Management Guided Setup? Similarly, what path in the All Menu allows you to administrate Knowledge Bases? [LD4: Self–Service & Automation]", a: "All > Knowledge > Administration > Guided Setup and All > Knowledge > Administration > Knowledge Base" },
            { s: "Deck 4", q: "How many Knowledge bases can an article be associated with? How many categories can a Knowledge Base contain? [LD4: Self–Service & Automation]", a: "Articles: 1, Categories: Many" },
            { s: "Deck 4", q: "What do Knowledge Bases use to define which users can create, read, write and retire articles? [LD4: Self–Service & Automation]", a: "User Criteria" },
            { s: "Deck 4", q: "User Criteria is applied at the Knowledge Base level. What 4 outcomes does User Criteria contain? [LD4: Self–Service & Automation]", a: "1. canRead 2. cantRead 3. canContribute 4. cantContribute" },
            { s: "Deck 4", q: "Which property should be changed to ensure only logged in users can access a Knowledge Base? [LD4: Self–Service & Automation]", a: "glide.knowman.block_access_with_no_user_criteria" },
            { s: "Deck 4", q: "What are the 6 base Workflows available in the ServiceNow baseline instance provided in training? [LD4: Self–Service & Automation]", a: "1. Approval Publish 2. Approval Retire 3. Instant Publish 4. Instant Retire 5. Publish Knowledge 6. Retire Knowledge" },
            { s: "Deck 4", q: "What are the 6 steps that provide a general overview of how to setup a Knowledge Base and setup approval workflows through a group and User Criteria?", a: "1. Create the KB (knowledge base) 2. Create a group to manage the KB approvals 3. Assign the [knowledge_manager] and [approver_user] roles to the group 4. Update the Owner, Publish/Retire workflows and add the group under Can Contribute for KB 5. Create User Criteria 6. Apply User Criteria to Can Read for KB" },
            { s: "Deck 4", q: "Which role, in addition to \"admin\", allows a user to manage Service Catalogs? [LD4: Self–Service & Automation]", a: "catalog_admin" },
            { s: "Deck 4", q: "What path in the All Menu allows you to create or modify Catalog Items and variables? [LD4: Self–Service & Automation]", a: "All > Service Catalog > Catalog Definitions > Maintain Items" },
            { s: "Deck 4", q: "What are Service Catalog variables? Provide 3 common types. [LD4: Self–Service & Automation]", a: "variables: provide options to tailor a catalog item to the customer’s needs, helping define the structure of the item form displayed. – Multiple Choice – Select Box – Single Line Text – Reference – CheckBox" },
            { s: "Deck 4", q: "What path in the All Menu allows you to define/create Variable Sets? Why would you use them? [LD4: Self–Service & Automation]", a: "All > Service Catalog > Catalog Variables > Variable Sets. variable set: a container used to store a collection of variables which can be shared between catalog items. Saves time and avoids repetition creating catalog items." },
            { s: "Deck 4", q: "What are the 5 major components of the Service Catalog? [LD4: Self–Service & Automation]", a: "1. Items 2. Variables 3. Variable Sets 4. Record Producers 5. Flows" },
            { s: "Deck 4", q: "What is a Record Producer within a Service Catalog used for? [LD4: Self–Service & Automation]", a: "A simplified form, allowing users to provide information that is then translated into task–based records. (ex. User submits a short form outlining a defect, which a Record Producer then turns into a Incident task assigned to the Hardware group)" },
            { s: "Deck 4", q: "What is the best practice for Record Producers to ensure that standard Service Catalog processes are followed? [LD4: Self–Service & Automation]", a: "Do not create Request Items with Record Producers: – Record Producers should only create Task–based records. – Request Items should be created with Catalog Items." },
            { s: "Deck 4", q: "Why would you implement an Order Guide? [LD4: Self–Service & Automation]", a: "Order Guides provide the ability to order multiple, related items as a single request." },
            { s: "Deck 4", q: "For Service Catalog Items, identify the entities that are created upon an order being placed, including prefixes and associated table names. [LD4: Self–Service & Automation]", a: "– REQ# Request [sc_request] – RITM# Requested Item [sc_req_item] – SCTASK# Catalog Task [sc_task]" },
            { s: "Deck 4", q: "Similar to Knowledge Bases, What does User Criteria do in relation to Service Catalog? [LD4: Self–Service & Automation]", a: "Maintains Catalog security. User Criteria defines conditions that determine which Users can access Service Catalog Items." },
            { s: "Deck 4", q: "What path in the All Menu allows you to access the Flow Designer? [LD4: Self–Service & Automation]", a: "All > Process Automation > Flow Designer" },
            { s: "Deck 4", q: "Which roles may be required to work with Flow Designer in various capacities? [LD4: Self–Service & Automation]", a: "– flow_designer – flow_operator – action_designer" },
            { s: "Deck 4", q: "What does a flow consist of? [LD4: Self–Service & Automation]", a: "A trigger and one or more actions." },
            { s: "Deck 4", q: "Which 5 trigger types can be displayed in a Flow Diagram? [LD4: Self–Service & Automation]", a: "1. Record triggers 2. Data triggers 3. Inbound email 4. Service Catalog 5. SLA Task" },
            { s: "Deck 4", q: "Triggers instantiate the flow and can be record–based, date–based or application–based. Define these. [LD4: Self–Service & Automation]", a: "Record–based: triggers after a record has been created or updated; Date–based: triggers run at the specified date/time or scheduled intervals; Application–based: triggers when application–specific conditions are met (application spoke is activated)" },
            { s: "Deck 4", q: "What are the 4 main components of a Flow? [LD4: Self–Service & Automation]", a: "1. Triggers 2. Conditions 3. Actions 4. Data" },
            { s: "Deck 4", q: "What is the Process Automation Designer used for? [LD4: Self–Service & Automation]", a: "Enables owners to author cross–enterprise workflows and create a single unified process. Connects multiple flows and actions into an end–to–end business workflow." },
            { s: "Deck 4", q: "What is the conversational platform called that helps users obtain information, make decisions and perform common work tasks within a messaging interface? [LD4: Self–Service & Automation]", a: "Virtual Agent" },

            // [Deck 5]
            { s: "Deck 5", q: "The ServiceNow infrastructure includes tables, records and fields. Put these in hierarchical order from largest to smallest. [LD5: Database Management]", a: "Tables contain Records contain Fields" },
            { s: "Deck 5", q: "What path in the All Menu allows you to access the System Dictionary? What key function does this serve? [LD5: Database Management]", a: "All > System Definition > Dictionary This contains the definition for each and every table and field in the database." },
            { s: "Deck 5", q: "What is the name of the 32–character, globally unique ID, that is assigned to a record? [LD5: Database Management]", a: "sys_id" },
            { s: "Deck 5", q: "What path in the All Menu allows you to alter the number format and prefixes used for records? [LD5: Database Management]", a: "All > System Definition > Number Maintenance" },
            { s: "Deck 5", q: "Every field in a record has 3 key attributes. What are they? [LD5: Database Management]", a: "1. Label – user–friendly term (ex. “Last Name”) 2. Name – system–friendly term (ex. “last_name”) 3. Value – actual data (ex. “Hullah”)" },
            { s: "Deck 5", q: "Fill in the blanks for this example to indicate the reference relationship using \"Caller\" and \"User\". \"The ______ field on the Incident table is a reference to a record on the ______ table.\" [LD5: Database Management]", a: "The Caller field on the Incident table is a reference to a record on the User table." },
            { s: "Deck 5", q: "There are 4 ways tables can be related to each other. What are they? [LD5: Database Management]", a: "1. One–to–Many 2. Many–to–Many 3. Database Views 4. Extensions" },
            { s: "Deck 5", q: "There are 3 \"One–to–Many\" relationship fields that could exist in a table. Define them. [LD5: Database Management]", a: "1. Reference Fields: select one record from another table (ex. Incident.Caller –> User) 2. Glide List: select multiple records on a table defined by the glide list (ex. Incident.Watchlist –> User) 3. Document ID Fields: select a record on any table in an instance (ex. Document field on the Translated Text table)" },
            { s: "Deck 5", q: "What path in the All Menu allows you to create or modify Database Views? [LD5: Database Management]", a: "All > System Definition > Database Views" },
            { s: "Deck 5", q: "Complete this sentence. \"A table that extends another table is called a _____ class, and the table that it extends is called the _____ class.\" [LD5: Database Management]", a: "\"A table that extends another table is called a child class, and the table that it extends is called the parent class.\"" },
            { s: "Deck 5", q: "What are the 3 table extension models supported in the Now Platform? [LD5: Database Management]", a: "1. Table per class 2. Table per hierarchy 3. Table per partition" },
            { s: "Deck 5", q: "What 3 attributes does an extension model determine? [LD5: Database Management]", a: "1. The number of database tables created 2. The derivation of fields from parent classes 3. The replication of records from child classes" },
            { s: "Deck 5", q: "Complete this sentence. \"A parent class that is not an extension of another table is called a _____ table. [LD5: Database Management]", a: "base" },
            { s: "Deck 5", q: "True/False: A table can be both a parent and child class both extending and providing extensions from other tables. [LD5: Database Management]", a: "True" },
            { s: "Deck 5", q: "What is the difference between a base table and a core table? [LD5: Database Management]", a: "core: table that exists in the ServiceNow base system, and can have both parent/child relationships (extended/extension) base: table that has no parent, but can have child relationships (extension)" },
            { s: "Deck 5", q: "What 3 table types is the \"Task\" table? [LD5: Database Management]", a: "1. core table – comes with ServiceNow base 2. base table – no parent 3. parent table – has children (Incident, Problem and Change Request)" },
            { s: "Deck 5", q: "When creating a new custom table, what dictates whether the new table is prefixed with \"_x\" or \"_u\"? [LD5: Database Management]", a: "_x: table is being created in a scoped application _u: table is being created in an un–scope application (global)" },
            { s: "Deck 5", q: "What provides a graphic representation of other tables related to specific table? [LD5: Database Management]", a: "Schema Map" },
            { s: "Deck 5", q: "How do you access the Schema Map? [LD5: Database Management]", a: "1. All > System Definition > Tables 2. Open the table, scroll down to Related Links 3. Select Show Schema Map." },
            { s: "Deck 5", q: "ServiceNow provides 3 levels of security before an end user has the capability to perform CRUD operations on a table. What are they? [LD5: Database Management]", a: "1. User Authentication / Login (ex. users, groups, roles) 2. Application and Modules Access (ex. roles configured at Application and Module level) 3. Database Access (globally defined system properties as well as table/field level access controls" },
            { s: "Deck 5", q: "Where in the All Menu path are the 3 security modules typically used by the System Administrator? [LD5: Database Management]", a: "1. All > System Properties > Security 2. All > System Security > Access Control (ACL) 3. All > System Security > High Security Settings" },
            { s: "Deck 5", q: "What is an access control? At what 2 levels can it be set? [LD5: Database Management]", a: "access control: security rule defined to restrict the permissions of a user from viewing and interacting with data 1. access to the record (row) 2. access to the column (field)" },
            { s: "Deck 5", q: "What does the Access Control List (ACL) do? [LD5: Database Management]", a: "This module contains an instance's Access Control Rules." },
            { s: "Deck 5", q: "Which 3 items define the access control rule? [LD5: Database Management]", a: "1. Operation: valid action the system can take (CRUD) 2. the object being secured (table/table & field) 3. the permissions required to access the object (ex. roles, conditional expressions, scripts)" },
            { s: "Deck 5", q: "What is the shortcut in the Filter Navigator to bring up the Access Controls associated with a specific table? [LD5: Database Management]", a: "Using the Filter Navigator, type: .config and select Access Controls tab" },
            { s: "Deck 5", q: "When a custom table is created, what 4 rules does the system automatically generate? What other system element is created as well? [LD5: Database Management]", a: "1. create access control rule 2. delete access control rule 3. read access control rule 4. write access control rule A role is also created by default and associated with the access control rules" },
            { s: "Deck 5", q: "What 3 Access Control Rule definitions exist? Provide the \"house\" analogy given in the training for these 3 rules. [LD5: Database Management]", a: "1. table.––None–– (whole house) 2. table.field (specific room in the house) 3. table.* (all other rooms not defined by a house.field rule" },
            { s: "Deck 5", q: "Best Practice – fill in the blanks: – When creating .* Access Controls also create a _____ Access Control, because only _____ grants access to records. – When writing an ACL that mostly grants access, use only _____. – When writing an ACL that mostly denies access, use _____ and _____. [LD5: Database Management]", a: "– When creating .* Access Controls also create a None Access Control, because only None grants access to records. – When writing an ACL that mostly grants access, us only None. – When writing an ACL that mostly denies access, use None and .*" },
            { s: "Deck 5", q: "When a session requests data, the system performs 2 checks for matching access control rules. What are they and in which order are they performed? [LD5: Database Management]", a: "1. Match the object against the table (most specific to most general) 2. Match the object against the field (most specific to most general)" },
            { s: "Deck 5", q: "Fill in the blanks with (table / field): If a user fails a _____ access control rule, the user is denied access to all fields in the table, even if the user would pass a _____ ACL rule. [LD5: Database Management]", a: "If a user fails a table access control rule, the user is denied access to all fields in the table, even if the user would pass a field ACL rule." },
            { s: "Deck 5", q: "Define what an import set is. [LD5: Database Management]", a: "import set: tool used to import data from various sources and map their data into ServiceNow tables." },
            { s: "Deck 5", q: "What is CSV and what is its use case in an Import set?", a: "Comma-Separated Values. Used as a file source for importing flat, tabular data exported from spreadsheets or legacy systems." },
            { s: "Deck 5", q: "What is XML and what is its use case in an Import set?", a: "eXtensible Markup Language. Used as a file source for importing structured, hierarchical data, often from other applications or exported from other ServiceNow instances." },
            { s: "Deck 5", q: "What is JDBC and what is its use case in an Import set?", a: "Java Database Connectivity. Used as a database source to establish a direct connection to an external relational database (like SQL Server or Oracle) to periodically pull in records." },
            { s: "Deck 5", q: "What is LDAP and what is its use case in an Import set?", a: "Lightweight Directory Access Protocol. Used as a directory source to connect to external directory servers (like Active Directory) to import and securely synchronize user and group data." },
            { s: "Deck 5", q: "What is REST and what is its use case in an Import set?", a: "Representational State Transfer. Used as a web service source to pull data from modern web applications and cloud services via standard HTTP API requests." },
            { s: "Deck 5", q: "What is SOAP and what is its use case in an Import set?", a: "Simple Object Access Protocol. Used as a web service source to integrate with enterprise or legacy web services that require strict, XML-based messaging." },
            { s: "Deck 5", q: "What role, other then admin, allows a user to manage all aspects of Import Sets? [LD5: Database Management]", a: "import_admin" },
            { s: "Deck 5", q: "Define what a data source is with regards to Import Sets. Provide 3 examples. [LD5: Database Management]", a: "data source: records in ServiceNow that contain information regarding an Import Set (ex. XML, CSV, Excel, LDAP, JDBC, HTTP/FTP)" },
            { s: "Deck 5", q: "Define what an import table is with regards to Import Sets. [LD5: Database Management]", a: "import table: acts as a staging area for records imported from the data source." },
            { s: "Deck 5", q: "Define what a transform map does with regards to Import Sets. [LD5: Database Management]", a: "transform map: mapping guide for for moving import data from Import Set (staging) tables to \"Target\" tables." },
            { s: "Deck 5", q: "Put these 4 steps in order of how they occur for handling Import Sets and importing data: \"target\" table, import table, transform map and data sources [LD5: Database Management]", a: "1. Data sources –> 2. Import Table –> 3. Transform map –> 4. \"Target Table\"" },
            { s: "Deck 5", q: "What is the difference between the Automatic Mapping Utility and the Mapping Assist Utility when working with Import Sets? [LD5: Database Management]", a: "Automatic Mapping Utility: simplest mapping method where all the field names of the Import Set match the name of the fields on the Target table Mapping Assist Utility: provides a visually intuitive environment for specifying mapping between Import Set fields and Target table fields" },
            { s: "Deck 5", q: "What does it mean to designate a coalesce field during a data import? [LD5: Database Management]", a: "A coalesced field will act as a unique key during data imports which will update over existing data as opposed to creating new records." },
            { s: "Deck 5", q: "There are 3 possible configurations you can use to coalesce data in Import Sets. What are they? [LD5: Database Management]", a: "1. Single–field 2. Multiple–field 3. Conditional (using a script to return the sys_id of the target table record" },
            { s: "Deck 5", q: "What path in the All menu allows you to access System Import Sets? [LD5: Database Management]", a: "All > System Import Sets > Load Data" },
            { s: "Deck 5", q: "What path in the All menu allows you to create a Transform Map? [LD5: Database Management]", a: "All > System Import Sets > Create Transform Map" },
            { s: "Deck 5", q: "What path in the All menu allows you to view/add Transform Maps? [LD5: Database Management]", a: "All > System Import Sets > Administration > Transform Maps" },
            { s: "Deck 5", q: "What path in the All menu allows you to clean up Import Set Tables? [LD5: Database Management]", a: "All > System Import Sets > Import Set Tables > Cleanup" },
            { s: "Deck 5", q: "Define what CMDB means as an acronym. What is the CMDB used for? [LD5: Database Management]", a: "CMDB – Configuration Management DataBase – series of tables and fields that contain all of the Configuration Items (CIs) controlled by the company." },
            { s: "Deck 5", q: "What are the 3 key system tables related to CMDB? [LD5: Database Management]", a: "1. cmdb2. cmdb_ci 3. cmdb_rel_ci" },
            { s: "Deck 5", q: "What path in the All menu brings up the CI Class Manager tool? [LD5: Database Management]", a: "All > Configuration > CI Class Manager" },
            { s: "Deck 5", q: "Which 3 attribute tabs are provided when viewing a select CI in the CI Class Manager? [LD5: Database Management]", a: "1. All 2. Derived 3. Added" },
            { s: "Deck 5", q: "Define what CSDM means as an acronym. What is the CSDM used for? [LD5: Database Management]", a: "CSDM – Common Service Data Model The CSDM is a CDMB–based framework that identifies where to place data for the products that you are using." },

            //[Deck 6]
            { s: "Deck 6", q: "ServiceNow uses what type of simple scripting language for both server and client–side scripting? [LD6: Data Migration and Integration]", a: "JavaScript" },
            { s: "Deck 6", q: "Complete this sentence. _______ scripts run on the user's web browser and _____ scripts run on the server (which includes the ServiceNow database). [LD6: Data Migration and Integration]", a: "Client scripts run on the user's web browser and Server scripts run on the server (which includes the ServiceNow database)." },
            { s: "Deck 6", q: "Put these items in order to show the path taken from the client to the ServiceNow Database on the server. Internet, ServiceNow Database, Web Browser, Application Server, [LD6: Data Migration and Integration]", a: "Web Browser ––> Internet ––> Application Server ––> ServiceNow Database" },
            { s: "Deck 6", q: "Define what a UI Policy is. [LD6: Data Migration and Integration]", a: "UI Policy: a rule that is applied to a form to dynamically change information or the form itself." },
            { s: "Deck 6", q: "Answer \"server\" or \"client\" to complete this sentence: UI Policies execute on the ____ side. [LD6: Data Migration and Integration]", a: "client" },
            { s: "Deck 6", q: "Provide 3 examples of what you can set fields to on a form using a UI Policy. [LD6: Data Migration and Integration]", a: "1. Mandatory or Optional 2. Hidden or Visible 3. Read–only or Editable" },
            { s: "Deck 6", q: "How would you apply a UI Policy to ALL views? [LD6: Data Migration and Integration]", a: "Set the global setting equal to true." },
            { s: "Deck 6", q: "Define what a Data Policy is. [LD6: Data Migration and Integration]", a: "Data Policy: rule that enforces data consistency by setting fields as mandatory and/or read–only." },
            { s: "Deck 6", q: "Answer \"server\" or \"client\" to complete this sentence: Data Policies execute on the ____ side. [LD6: Data Migration and Integration]", a: "server" },
            { s: "Deck 6", q: "Describe the difference between a UI Policy and a Data Policy. [LD6: Data Migration and Integration]", a: "UI Policy: only enforced on data entered into a form through the UI Data Policy: enforced on all data entered into the platform (form UI, Import Sets or Web Services)" },
            { s: "Deck 6", q: "Answer \"server\" or \"client\" to complete this sentence: A Data Policy executes on the _____ side but can also run as a UI Policy on the ______ side. [LD6: Data Migration and Integration]", a: "A Data Policy executes on the server side but can also run as a UI Policy on the client side." },
            { s: "Deck 6", q: "If a Data Policy is enforced to make a field read–only on a List, will the field still appear editable to the user? [LD6: Data Migration and Integration]", a: "Yes, but the update will fail." },
            { s: "Deck 6", q: "Answer True/False: Data Policies are used to enforce security on the platform. [LD6: Data Migration and Integration]", a: "False. Data Policies are used to standardize the same data across ServiceNow applications, managing the integrity of the information stored in the database." },
            { s: "Deck 6", q: "When is a Data Policy enforced? [LD6: Data Migration and Integration]", a: "When a record is submitted from the User Interface (UI). This behavior cannot be changed." },
            { s: "Deck 6", q: "Define what a UI Action is. Provide an example. [LD6: Data Migration and Integration]", a: "UI Action: adds buttons, links and context menu items on forms and lists Example: adding Create Problem to an existing Incident form" },
            { s: "Deck 6", q: "Answer True/False: A UI Action only runs on the server side. [LD6: Data Migration and Integration]", a: "False. A UI Action can be either server or client side (depending on the \"client\" check box selection)" },
            { s: "Deck 6", q: "What 3 examples of UI Actions pertain to a Form? [LD6: Data Migration and Integration]", a: "1. Form buttons 2. Form context menu (right–click header) 3. Form links" },
            { s: "Deck 6", q: "What 4 examples of UI Actions pertain to a List? [LD6: Data Migration and Integration]", a: "1. List buttons 2. List context menu (right–click a record) 3. List choices (at the bottom of a list) 4. List links (Related links at the bottom of a list)" },
            { s: "Deck 6", q: "Which checkbox needs to be selected to make a UI Action visible and interactive to the user? [LD6: Data Migration and Integration]", a: "Active" },
            { s: "Deck 6", q: "Define what a client script is. Provide an example. [LD6: Data Migration and Integration]", a: "client script: makes \"real–time\" changes to the appearance of the user interface, especially forms. Example: having an alert appear to a user when they change the priority of an Incident." },
            { s: "Deck 6", q: "What are the 4 types of client scripts supported in the ServiceNow platform and when do they execute? [LD6: Data Migration and Integration]", a: "1. onCellEdit() runs when cell on a list changes value 2. onChange() runs when a particular field changes value 3. onLoad() runs when a form is loaded 4. onSubmit() runs when a form is submitted" },
            { s: "Deck 6", q: "Define what a business rule is. [LD6: Data Migration and Integration]", a: "business rule: rule configured to run when a record is displayed, inserted, updated, deleted or when a table is queried" },
            { s: "Deck 6", q: "Answer True/False: A Business Rule only runs before database action has occurred. [LD6: Data Migration and Integration]", a: "False. A Business Rule can be set to run either before or after the database action has occurred." },
            { s: "Deck 6", q: "Business Rules execute on the _____ side. [LD6: Data Migration and Integration]", a: "server" },
            { s: "Deck 6", q: "Using the When setting on a Business Rule, what 4 choices are available to select? [LD6: Data Migration and Integration]", a: "1. Before a record is saved to the database 2. After a record is saved to the database 3. Async (queued); client and server work independently 4. Display before the record is displayed" },
            { s: "Deck 6", q: "Which 4 sections are defined within a Business Rule? (include tabs) [LD6: Data Migration and Integration]", a: "1. Table to run against [no tab] 2. Timing of execution [\"When to run\"] 3. Conditions to evaluate [\"When to run\"] 4. What actions to take [\"Actions\"]" },
            { s: "Deck 6", q: "What is the primary difference between a Business Rule and a Client Script? [LD6: Data Migration and Integration]", a: "a Client Script only executes on the client (typically used on forms) whereas a Business Rule can be executed on the server and are applied consistently regardless of how they are accessed (i.e. not just forms)." },
            { s: "Deck 6", q: "What should you always consider prior to implementing a Business Rule? [LD6: Data Migration and Integration]", a: "Consider whether you can accomplish the same goal using Flow Designer." },
            { s: "Deck 6", q: "Which of these are executed on Client side and which of these are executed on Server side? A. UI Policy / UI Action B. Data Policy C. Client Script D. Business Rule [LD6: Data Migration and Integration]", a: "Client side: A, C Server side: B, D" },
            { s: "Deck 6", q: "Define what a Catalog UI Policy is. Provide an example. [LD6: Data Migration and Integration]", a: "Catalog UI Policy: controls the behavior of catalog item forms when presented to the users. Example: If ship–to address is internal, show \"Office\" field; otherwise show \"Address\" field." },
            { s: "Deck 6", q: "Catalog client scripts run client side to control behavior of catalog items presented to users. What 3 options exist to determine when the script is executed (on_____())? [LD6: Data Migration and Integration]", a: "1. onLoad() 2. onChange() 3. onSubmit()" },
            { s: "Deck 6", q: "How do you configure UI Policies? (2 answers). [LD6: Data Migration and Integration]", a: "1. From the additional actions menu, select Configure > UI Policies 2. All > System UI > UI Policies" },
            { s: "Deck 6", q: "What ServiceNow capability protects applications by identifying and restricting access to available artifacts and data? [LD6: Data Migration and Integration]", a: "Application Scoping" },
            { s: "Deck 6", q: "Applications that were created prior to application scoping are in _________ scope. [LD6: Data Migration and Integration]", a: "global" },
            { s: "Deck 6", q: "What does the system add to the front of application artifacts such as tables, scripts and configuration records? [LD6: Data Migration and Integration]", a: "namespace identifier" },
            { s: "Deck 6", q: "Define what a Update Set is. [LD6: Data Migration and Integration]", a: "Update Set: group of configuration changes that can be moved from one instance to another" },
            { s: "Deck 6", q: "What file format is an update set stored in? [LD6: Data Migration and Integration]", a: "XML" },
            { s: "Deck 6", q: "What 3 items are contained within an Update Set? [LD6: Data Migration and Integration]", a: "1. A set of record details that uniquely identify the update set 2. A list of configuration changes 3. A state that determines whether another instance can retrieve and apply configuration changes" },
            { s: "Deck 6", q: "Which table does an Update Set write changes from tracked tables to? [LD6: Data Migration and Integration]", a: "sys_update_xml" },
            { s: "Deck 6", q: "When merging multiple Update Sets, if multiple sets have modified the same object (ex. Incident), what will the system do? [LD6: Data Migration and Integration]", a: "only the most recent change will be moved to the new, merged Update Set" },
            { s: "Deck 6", q: "What path in the All menu allows you to create or update an existing Update Set? [LD6: Data Migration and Integration]", a: "All > System Update Sets > Local Update Sets" },
            { s: "Deck 6", q: "Instead of accessing the list of Local Update Sets via the All menu, how can you accomplish this within the interface? [LD6: Data Migration and Integration]", a: "Click the Globe in the Unified Navigation Header. Click Update Set (default: Global). Click the Open List icon." },
            { s: "Deck 6", q: "Instead of accessing the current Update Set via the All menu, how can you accomplish this within the interface? [LD6: Data Migration and Integration]", a: "Click the Globe in the Unified Navigation Header. Click current Update Set. Click the Open Record icon." },
            { s: "Deck 6", q: "It is recommended to avoid using the Default Update Set to move customizations between instances. What should you do instead? [LD6: Data Migration and Integration]", a: "used a named Update Set (user–created)" },
            { s: "Deck 6", q: "What allows you to group multiple Update Sets together so you can preview and commit them in bulk? [LD6: Data Migration and Integration]", a: "batch update sets" },
            { s: "Deck 6", q: "Dealing with multiple update sets can lead to problems. Provide 2 problems you can avoid and what the recommended alternative is. [LD6: Data Migration and Integration]", a: "1. committing the update sets in the wrong order 2. inadvertently leaving out one or more sets Avoid these problems by grouping completed update sets into a batch." },
            { s: "Deck 6", q: "Complete this sentence using \"Process\" and \"Data\": Update Sets capture customization or configuration changes for _________ records but do not include changes to _________ records. [LD6: Data Migration and Integration]", a: "Update Sets capture customization or configuration changes for Process records, but do not include changes to Data records." },
            { s: "Deck 6", q: "An Update Set can capture many changes to Process Records. Provide 3 examples of these types of records. [LD6: Data Migration and Integration]", a: "– Business Rules – Client Scripts – Fields – Forms and Form Sections – Report Definitions – Tables – Views – Roles – Published Workflows" },
            { s: "Deck 6", q: "What by default is not captured in an Update Set but can be manually added? What is the function called to add it? [LD6: Data Migration and Integration]", a: "Dashboards can be manually added by using the Unload Dashboard function." },
            { s: "Deck 6", q: "An administrator may want to move data that would not be captured within an Update Set. How should you move this data? [LD6: Data Migration and Integration]", a: "export XML function" },
            { s: "Deck 6", q: "If the Update Set \"state\" is marked In Progress, what button would you press to select the currently shown Update Set as the target for configuration changes? [LD6: Data Migration and Integration]", a: "Submit and Make Current" },
            { s: "Deck 6", q: "What does it mean to mark an Update Set as \"Complete\"? [LD6: Data Migration and Integration]", a: "The set is ready to migrate and is available for other instances to retrieve." },
            { s: "Deck 6", q: "True/False: If you want to add more updates to an Update Set marked Complete, set it back to In Progress first, make the changes and move it back to Complete. [LD6: Data Migration and Integration]", a: "False Once an Update Set is marked Complete, you should never change it back to In Progress. Instead, if you need to add additional changes, create another update set and commit them both together." },
            { s: "Deck 6", q: "What path in the All menu allows you to Retrieve Update Sets? [LD6: Data Migration and Integration]", a: "All > System Update Sets > Retrieved Update Sets" },
            { s: "Deck 6", q: "What are the 3 steps in the typical process of retrieving an Update Set? [LD6: Data Migration and Integration]", a: "1. Retrieve 2. Preview 3. Commit" },
            { s: "Deck 6", q: "What does previewing a retrieved Update Set allow you to do? [LD6: Data Migration and Integration]", a: "previewing compares a retrieved update set from a remote instance to updates on the local instance to detect potential problems." },
            { s: "Deck 6", q: "What is the maximum number of records ServiceNow recommends not to exceed within an Update Set? [LD6: Data Migration and Integration]", a: "100" },
